<form [formGroup]="mform">

  <div class="row">
    <div class="col-sm-3">
      <div class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="" >From</label>
        <div class="col-sm-3">
          <app-date formControlName="mbl_from_date" [format]="gs.globalConstants.global_date_format" [placeholder]="gs.globalConstants.global_date_format"></app-date>
        </div>
        <label class="col-sm-2 form-label form-label-sm" for="">To</label>
        <div class="col-sm-3">
          <app-date formControlName="mbl_to_date" [format]="gs.globalConstants.global_date_format" [placeholder]="gs.globalConstants.global_date_format"> </app-date>
        </div>
      </div>
      
      <div class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="">Format</label>
        <div class="col-sm-8">
          <app-combobox maxlength="30" formControlName="mbl_format" name="mbl_format" [dataSource]="formatList"
            [valueColumn]="'key'" [displayColumn]="'value'" case="UPPER"></app-combobox>
        </div>
      </div>

      <div class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="">Type</label>
        <div class="col-sm-8">
          <app-combobox maxlength="30" formControlName="mbl_report_type" name="mbl_report_type" [dataSource]="repTypeList"
            [valueColumn]="'key'" [displayColumn]="'value'" case="UPPER"></app-combobox>
        </div>
      </div>
    </div>
    <div class="col-sm-3">
      <div class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="">Group</label>
        <div class="col-sm-8">
          <app-combobox maxlength="30" formControlName="mbl_mode" name="mbl_mode" [dataSource]="groupList"
            [valueColumn]="'key'" [displayColumn]="'value'" case="UPPER" ></app-combobox>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="">Shipment</label>
        <div class="col-sm-8">
          <app-combobox maxlength="30" formControlName="mbl_cntr_type" name="mbl_cntr_type" [dataSource]="ShipTypeList"
            [valueColumn]="'key'" [displayColumn]="'value'" case="UPPER"></app-combobox>
        </div>
      </div>
      <div class="form-group row">
      <label class="col-sm-4 form-label form-label-sm" for="">Agent</label>
        <div class="col-sm-8">
          <auto-complete maxlength="60" formControlName="mbl_agent_name" id="mbl_agent_name" (CallBack)="callBack($event)"
            table="customerm" [company_id]="getCompanyId()" [url]="url"
            display_column="[{'caption':'code','value':'cust_code'},{'caption':'name','value':'cust_name'}]"></auto-complete>
        </div>
      </div>
    </div>

    <div class="col-sm-6">
      <div class="form-group row">
        <div class="col-sm-12">
          <button class="btn btn-sm btn-success me-1" (click)="search('SEARCH')">Search</button>
          <button class="btn btn-sm btn-success me-1 " *ngIf="print" (click)="search('PRINT')">Print</button>
        </div>
      </div>
    </div>
  </div>
</form>
