<form [formGroup]="mform">

  <div class="row">
    <div class="col-sm-6">

      <div class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="" >From</label>
        <div class="col-sm-3">
          <app-date formControlName="cust_from_date" [format]="gs.globalConstants.global_date_format" [placeholder]="gs.globalConstants.global_date_format"></app-date>
        </div>
        <label class="col-sm-2 form-label form-label-sm" for="">To</label>
        <div class="col-sm-3">
          <app-date type="text" formControlName="cust_to_date" [format]="gs.globalConstants.global_date_format" [placeholder]="gs.globalConstants.global_date_format"> </app-date>
        </div>
      </div>

      <div *ngIf="mform.get('cust_format')?.value === 'STANDARD'" class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="">Category</label>
        <div class="col-sm-8">
          <app-combobox maxlength="30" formControlName="cust_type" name="cust_type" [dataSource]="typeList"
            [valueColumn]="'key'" [displayColumn]="'value'" case="UPPER"></app-combobox>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="">Name</label>
        <div class="col-sm-8">
          <app-input maxlength="30" formControlName="cust_name" [case]="'UPPER'"></app-input>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-4 form-label form-label-sm" for="">Formats</label>
        <div class="col-sm-8">
          <app-combobox maxlength="30" formControlName="cust_format" name="cust_format" [dataSource]="formatList"
            [valueColumn]="'key'" [displayColumn]="'value'" case="UPPER"></app-combobox>
        </div>
      </div>
    </div>

    <div class="col-sm-6">
      <div class="form-group row">
        <div class="col-sm-12">
          <button class="btn btn-sm btn-success me-1" (click)="search('SEARCH')">Search</button>
          <button class="btn btn-sm btn-success me-1 " *ngIf="print" (click)="search('PRINT')">Print</button>
        </div>
      </div>
    </div>
  </div>
</form>
