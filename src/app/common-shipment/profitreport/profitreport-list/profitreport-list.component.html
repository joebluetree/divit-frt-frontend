<div class="page-header">
  <h5>{{title}}</h5>
  <button class="btn btn-success btn-sm" (click)="return2Parent()">Return</button>
</div>

<div class="page-search">
  <app-profitreport-search [search_url]="'/api/CommonShipment/profitreport/GetListAsync'" [input]="ms.getSearchRecord()" [print]="this.Print"
    [parent_id]="parent_id" [summary]="ms.getSummaryRecords()" (searchResult)="search($event)"></app-profitreport-search>
</div>

<div class="page-pagination">
  <app-page [search_url]="'/api/CommonShipment/profitreport/GetListAsync'" [page]="ms.getPageRecord()"
    (pageEvents)="pageEvents($event)"></app-page>
</div>

<div class="page-body">
  <app-table [table]="table_data" [data]="ms.getRecords()" (callback_table)="callback_table($event)"
    (general_callback)="general_callback($event)" [delete_url]="'/api/CommonShipment/profitreport/DeleteAsync'"
    [sort_column]="ms.sortColumn" [sort_order]="ms.sortOrder" [row_id_name]="'inv_id'" [selected_id]="ms.selectedRow">
  </app-table>
</div>



<div class="page-pagination line-bottom">
  <app-page [search_url]="'/api/CommonShipment/profitreport/GetListAsync'" [page]="ms.getPageRecord()"
    (pageEvents)="pageEvents($event)"></app-page>
</div>
