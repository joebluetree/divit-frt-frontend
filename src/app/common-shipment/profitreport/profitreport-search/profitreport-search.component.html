<form [formGroup]="mform">

  <div class="row">
    <div class="col-md-12">
      <div class="page-body line-bottom">
        <div class="row">
          <div class="col-sm-3">
            <div class="form-group row">
              <label class="col-sm-4 form-label form-label-sm" for="">Ref #</label>
              <div class="col-sm-8">
                <app-input type="text" formControlName="inv_mbl_refno" [disable]="true"> </app-input>
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-4 form-label form-label-sm" for="">MASTER #</label>
              <div class="col-sm-8">
                <app-input type="text" formControlName="inv_mbl_no" [disable]="true"> </app-input>
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-4 form-label form-label-sm" for="">POL</label>
              <div class="col-sm-8">
                <app-input type="text" formControlName="inv_pol_name" [disable]="true"> </app-input>
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-4 form-label form-label-sm" for="">POD</label>
              <div class="col-sm-8">
                <app-input type="text" formControlName="inv_pod_name" [disable]="true"> </app-input>
              </div>
            </div>
          </div>
          <div class="col-sm-3">
            <div class="form-group row">
              <label class="col-sm-4 form-label form-label-sm" for="">WT</label>
              <div class="col-sm-8">
                <app-input type="text" formControlName="inv_wt" [disable]="true"> </app-input>
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-4 form-label form-label-sm" for="">CH.WT</label>
              <div class="col-sm-8">
                <app-input type="text" formControlName="inv_chwt" [disable]="true"> </app-input>
              </div>
            </div>
            <div class="form-group row">
              <label class="col-sm-4 form-label form-label-sm" for="">CBM</label>
              <div class="col-sm-8">
                <app-input type="text" formControlName="inv_cbm" [disable]="true"> </app-input>
              </div>
            </div>
          </div>
          
          <div class="col-sm-3">
            <div class="form-group row">
              <label class="col-sm-2 form-label form-label-sm" for="">TYPE</label>
              <div class="col-sm-6">
                <app-combobox maxlength="30" formControlName="inv_report_type" name="inv_report_type" [dataSource]="ReportType"
                  [valueColumn]="'key'" [displayColumn]="'value'" case="UPPER"></app-combobox>
              </div>
            </div>
            <div *ngIf="mform.value.inv_report_type === 'HOUSE WISE'" class="form-group row mt-1">
              <label class="col-sm-2 form-label form-label-sm" for=""></label>
              <div class="col-sm-3">
                <input type="radio" formControlName="inv_unit_type" value="CBM">
                <label class="ms-1 form-label form-label-sm ">CBM</label>
              </div>
              <div class="col-sm-3">
                <input type="radio" formControlName="inv_unit_type" value="WEIGHT">
                <label class="ms-1 form-label form-label-sm ">WEIGHT</label>
              </div>
            </div>
            <div class="form-group row mt-1">
              <label class="col-sm-2 form-label form-label-sm " for=""></label>
              <div class="col-sm-8">
                <button class="btn btn-sm btn-success me-1" (click)="search('SEARCH')">Search</button>
                <button class="btn btn-sm btn-success me-1 " *ngIf="print" (click)="search('PRINT')">Print</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</form>
